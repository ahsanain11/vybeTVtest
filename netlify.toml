[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/trial-request"
  to = "/.netlify/functions/trial-request"
  status = 200

[[redirects]]
  from = "/api/contact-message"
  to = "/.netlify/functions/contact-message"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
